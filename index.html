<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVR</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&family=Bebas+Neue&family=Russo+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="login-page">
    <!-- Animated Background -->
    <div class="bg-animation">
        <div class="cyber-grid"></div>
        <div class="floating-particles" id="particles"></div>
        <div class="glow-orbs">
            <div class="orb orb-1"></div>
            <div class="orb orb-2"></div>
            <div class="orb orb-3"></div>
        </div>
    </div>

    <!-- 3D Lamp Login Container -->
    <div class="login-container">
        <!-- Lamp Structure -->
        <div class="lamp-structure">
            <div class="lamp-top">
                <div class="lamp-shade"></div>
                <div class="lamp-bulb">
                    <div class="bulb-glow"></div>
                </div>
            </div>
            <div class="lamp-cord" id="lampCord">
                <svg viewBox="0 0 10 200" class="cord-svg">
                    <path id="cordPath" d="M5 0 Q5 100 5 200" stroke="url(#cordGradient)" stroke-width="3" fill="none"/>
                    <defs>
                        <linearGradient id="cordGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" style="stop-color:#ff00ff;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#8b00ff;stop-opacity:1" />
                        </linearGradient>
                    </defs>
                </svg>
                <div class="pull-dot" id="pullDot">
                    <div class="dot-inner"></div>
                    <div class="dot-ring"></div>
                    <span class="pull-text">PULL</span>
                </div>
            </div>
        </div>

        <!-- Login Form (Hidden initially) -->
        <div class="login-panel" id="loginPanel">
            <div class="panel-frame">
                <div class="corner corner-tl"></div>
                <div class="corner corner-tr"></div>
                <div class="corner corner-bl"></div>
                <div class="corner corner-br"></div>
                
                <div class="panel-content">
                    <div class="logo-section">
                        <div class="logo-icon">
                            <i class="fas fa-shield-halved"></i>
                            <div class="logo-glow"></div>
                        </div>
                        <h1 class="logo-title">DVR COMMUNITY</h1>
                        <p class="logo-subtitle">ENTER THE DIGITAL REALM</p>
                    </div>

                    <!-- Tab Switcher -->
                    <div class="auth-tabs">
                        <button class="tab-btn active" data-tab="login">
                            <i class="fas fa-sign-in-alt"></i> LOGIN
                        </button>
                        <button class="tab-btn" data-tab="register">
                            <i class="fas fa-user-plus"></i> REGISTER
                        </button>
                        <div class="tab-indicator"></div>
                    </div>

                    <!-- Login Form -->
                    <form class="auth-form" id="loginForm">
                        <div class="input-group">
                            <div class="input-icon">
                                <i class="fas fa-envelope"></i>
                            </div>
                            <input type="email" id="loginEmail" placeholder="EMAIL ADDRESS" required>
                            <div class="input-line"></div>
                        </div>
                        <div class="input-group">
                            <div class="input-icon">
                                <i class="fas fa-lock"></i>
                            </div>
                            <input type="password" id="loginPassword" placeholder="PASSWORD" required>
                            <div class="input-line"></div>
                        </div>
                        <button type="submit" class="submit-btn">
                            <span class="btn-text">ACCESS PORTAL</span>
                            <div class="btn-glow"></div>
                            <i class="fas fa-arrow-right"></i>
                        </button>
                    </form>

                    <!-- Register Form -->
                    <form class="auth-form hidden" id="registerForm">
                        <div class="input-group">
                            <div class="input-icon">
                                <i class="fas fa-user"></i>
                            </div>
                            <input type="text" id="regUsername" placeholder="USERNAME" required>
                            <div class="input-line"></div>
                        </div>
                        <div class="input-group">
                            <div class="input-icon">
                                <i class="fas fa-envelope"></i>
                            </div>
                            <input type="email" id="regEmail" placeholder="EMAIL ADDRESS" required>
                            <div class="input-line"></div>
                        </div>
                        <div class="input-group">
                            <div class="input-icon">
                                <i class="fas fa-lock"></i>
                            </div>
                            <input type="password" id="regPassword" placeholder="PASSWORD" required>
                            <div class="input-line"></div>
                        </div>
                        <button type="submit" class="submit-btn">
                            <span class="btn-text">CREATE ACCOUNT</span>
                            <div class="btn-glow"></div>
                            <i class="fas fa-rocket"></i>
                        </button>
                    </form>

                    <!-- Divider -->
                    <div class="divider">
                        <span>OR CONTINUE WITH</span>
                    </div>

                    <!-- Google Login -->
                    <button class="google-btn" id="googleLogin">
                        <svg viewBox="0 0 24 24" class="google-icon">
                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                        <span>Sign in with Google</span>
                    </button>

                    <!-- Discord Link -->
                    <a href="https://discord.gg/dvr" target="_blank" class="discord-link">
                        <i class="fab fa-discord"></i>
                        <span>Join discord.gg/dvr</span>
                    </a>
                </div>
            </div>

            <!-- Made By Section -->
            <div class="made-by">
                <span>MADE BY</span>
                <span class="author">DRFX</span>
                <div class="heart-icon">
                    <i class="fas fa-heart"></i>
                    <div class="heart-glow"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Notification -->
    <div class="notification" id="notification">
        <i class="fas fa-info-circle"></i>
        <span id="notificationText"></span>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
